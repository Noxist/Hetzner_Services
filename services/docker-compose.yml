services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log
    networks:
      - shared_services

  printer-api:
    build:
      context: ./printer
    container_name: printer-api
    restart: always
    depends_on:
      - mqtt
    env_file:
      - .env
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USERNAME: leandro_printer
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      APP_API_KEY: ${APP_API_KEY}
      TZ: Europe/Zurich
    # WICHTIG: Alte Ports entfernt, damit Zugriff nur noch sicher über Caddy erfolgt
    # ports:
    #   - "8000:8080"
    expose:
      - "8080" # Macht den Port intern für Caddy sichtbar
    networks:
      - shared_services

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - printer-api
    networks:
      - shared_services

  bio-dashboard:
    build:
      context: ./bio-dashboard
    container_name: bio-dashboard
    restart: always
    env_file:
      - .env
    environment:
      BIO_DATA_DIR: /data
      BIO_API_KEY: ${BIO_API_KEY}
      HA_URL: ${HA_URL}
      HA_TOKEN: ${HA_TOKEN}
      HA_POLL_INTERVAL_SEC: 900
      PRINTER_URL: http://printer-api:8080
      PRINTER_API_KEY: ${APP_API_KEY}
      BIO_API_URL: http://localhost:8000
      TZ: Europe/Zurich
    volumes:
      - bio_data:/data
    expose:
      - "8000"
      - "8501"
    networks:
      - shared_services

  availability:
    build:
      context: ./availability
    container_name: availability
    restart: always
    environment:
      GOOGLE_CREDENTIALS_FILE: /data/google_credentials.json
      CALENDARS_CONFIG: /app/calendars.json
      URGENCY_CONFIG: /app/urgency_config.json
      TZ: Europe/Zurich
    volumes:
      - barber_data:/data      # shares credentials with barber-booker
    expose:
      - "8070"
    networks:
      - shared_services

  barber-booker:
    build:
      context: ./barber
    container_name: barber-booker
    restart: always
    depends_on:
      - availability
    env_file:
      - .env
    environment:
      BARBER_DATA_DIR: /data
      GOOGLE_CREDENTIALS_FILE: /data/google_credentials.json
      CALENDAR_ID: ${BARBER_CALENDAR_ID}
      AVAILABILITY_URL: http://availability:8070
      TRAVEL_BUFFER_BEFORE: 60
      TRAVEL_BUFFER_AFTER: 30
      BIO_API_URL: http://bio-dashboard:8000
      BIO_API_KEY: ${BIO_API_KEY}
      PRINTER_URL: http://printer-api:8080
      PRINTER_API_KEY: ${APP_API_KEY}
      CHECK_INTERVAL_HOURS: 6
      TZ: Europe/Zurich
    volumes:
      - barber_data:/data
    expose:
      - "8090"
    networks:
      - shared_services

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${TUNNEL_TOKEN}
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - caddy
    networks:
      - shared_services

volumes:
  caddy_data:
  caddy_config:
  bio_data:
  barber_data:

networks:
  shared_services:
    external: true
