services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log
    networks:
      - shared_services

  printer-api:
    build:
      context: ./printer
    container_name: printer-api
    restart: always
    depends_on:
      - mqtt
    env_file:
      - .env
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USERNAME: leandro_printer
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      APP_API_KEY: ${APP_API_KEY}
      TZ: Europe/Zurich
    # WICHTIG: Alte Ports entfernt, damit Zugriff nur noch sicher über Caddy erfolgt
    # ports:
    #   - "8000:8080"
    expose:
      - "8080" # Macht den Port intern für Caddy sichtbar
    networks:
      - shared_services

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - printer-api
    networks:
      - shared_services

  bio-dashboard:
    build:
      context: ./bio-dashboard
    container_name: bio-dashboard
    restart: always
    env_file:
      - .env
    environment:
      BIO_DATA_DIR: /data
      BIO_API_KEY: ${BIO_API_KEY}
      HA_URL: ${HA_URL}
      HA_TOKEN: ${HA_TOKEN}
      HA_POLL_INTERVAL_SEC: 900
      PRINTER_URL: http://printer-api:8080
      PRINTER_API_KEY: ${APP_API_KEY}
      BIO_API_URL: http://localhost:8000
      TZ: Europe/Zurich
    volumes:
      - bio_data:/data
    expose:
      - "8000"
      - "8501"
    networks:
      - shared_services

  availability:
    build:
      context: ./availability
    container_name: availability
    restart: always
    profiles:
      - manual
    environment:
      GOOGLE_CREDENTIALS_FILE: /data/google_credentials.json
      CALENDARS_CONFIG: /app/calendars.json
      URGENCY_CONFIG: /app/urgency_config.json
      TZ: Europe/Zurich
    volumes:
      - barber_data:/data
    expose:
      - "8070"
    networks:
      - shared_services

  barber-booker:
    build:
      context: ./barber
    container_name: barber-booker
    restart: always
    profiles:
      - manual
    depends_on:
      - availability
    env_file:
      - .env
    environment:
      BARBER_DATA_DIR: /data
      GOOGLE_CREDENTIALS_FILE: /data/google_credentials.json
      CALENDAR_ID: ${BARBER_CALENDAR_ID}
      AVAILABILITY_URL: http://availability:8070
      TRAVEL_BUFFER_BEFORE: 60
      TRAVEL_BUFFER_AFTER: 30
      BIO_API_URL: http://bio-dashboard:8000
      BIO_API_KEY: ${BIO_API_KEY}
      PRINTER_URL: http://printer-api:8080
      PRINTER_API_KEY: ${APP_API_KEY}
      CHECK_INTERVAL_HOURS: 6
      TZ: Europe/Zurich
    volumes:
      - barber_data:/data
    expose:
      - "8090"
    networks:
      - shared_services

  organizer:
    build:
      context: ./organizer
    container_name: organizer
    restart: always
    profiles:
      - manual
    depends_on:
      - homebox
    env_file:
      - .env
    environment:
      ORGANIZER_DATA_DIR: /data
      HOMEBOX_URL: http://homebox:7745
      HOMEBOX_EXTERNAL_URL: ${HOMEBOX_EXTERNAL_URL:-http://localhost:3100}
      HOMEBOX_USER: ${HOMEBOX_USER}
      HOMEBOX_PASS: ${HOMEBOX_PASS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      GRID_SQUARE_MM: ${GRID_SQUARE_MM:-20}
      SLOT_SIZE_MM: ${SLOT_SIZE_MM:-50}
      TZ: Europe/Zurich
    volumes:
      - organizer_data:/data
    expose:
      - "8060"
    networks:
      - shared_services

  homebox:
    image: ghcr.io/sysadminsmedia/homebox:latest
    container_name: homebox
    restart: always
    profiles:
      - manual
    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_UPLOAD_SIZE=10
      - HBOX_OPTIONS_ALLOW_ANALYTICS=false
    volumes:
      - homebox-data:/data/
    expose:
      - "7745"
    networks:
      - shared_services

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${TUNNEL_TOKEN}
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - caddy
    networks:
      - shared_services

  bulk-ocr:
    build:
      context: ./ocr
      dockerfile: server/Dockerfile
    container_name: bulk-ocr
    restart: always
    env_file:
      - ./ocr/server/.env
    environment:
      PYTHONUNBUFFERED: 1
      TZ: Europe/Zurich
    volumes:
      - ocr_jobs:/app/server/jobs
    expose:
      - "8000"
    networks:
      - shared_services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ocr-auth:
    build:
      context: ./ocr-auth
    container_name: ocr-auth
    restart: always
    depends_on:
      - bulk-ocr
    env_file:
      - .env
    environment:
      UPSTREAM_URL: http://bulk-ocr:8000
      CF_ACCESS_TEAM: ${CF_ACCESS_TEAM}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD}
      TZ: Europe/Zurich
    expose:
      - "8080"
    networks:
      - shared_services

volumes:
  homebox-data:
  organizer_data:
  caddy_data:
  caddy_config:
  bio_data:
  barber_data:
  ocr_jobs:

networks:
  shared_services:
    external: true
