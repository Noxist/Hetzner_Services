services:
  app:
    build: .
    container_name: roombooker_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /home/leandro/auto_reserve_data:/home/leandro/auto_reserve_data
      - .:/app
    environment:
      - ROOMBOOKER_DATA_DIR=/home/leandro/auto_reserve_data
      - PYTHONUNBUFFERED=1
    command: python3 app.py
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shared_services

networks:
  shared_services:
    external: true
